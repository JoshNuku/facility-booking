<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Campus Facility Booking - User</title>
    <link rel="manifest" href="/api/v1/manifest.json" />
    <link rel="icon" href="/api/v1/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/api/v1/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/api/v1/styles.css" />
    <script>
        (function () {
            var s = JSON.parse(localStorage.getItem("session") || "null");
            if (!s) window.location.replace("/api/v1/login.html");
        })();
    </script>
</head>
<body>

<!-- App Bar -->
<header class="app-bar">
    <div class="app-bar-inner">
        <a class="app-bar-brand" href="/api/v1/index.html">
            <span class="app-bar-logo">🏛️</span>
            <span class="app-bar-title desktop-only">Campus Booking</span>
        </a>
        <div class="user-chip">
            <div class="user-avatar" id="user-avatar"></div>
            <span class="user-name desktop-only" id="user-name"></span>
            <button type="button" class="logout-btn" id="logout-btn" title="Sign Out">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="app-content">
    <div class="container page-shell">

        <section class="panel" id="facilities-section">
            <h2>Available Facilities</h2>
            <div id="facilities-list" class="cards"></div>
        </section>

        <section class="panel" id="availability-section">
            <h2>Availability (30-min Slots)</h2>
            <div class="controls">
                <label>
                    Facility
                    <select id="availability-facility"></select>
                </label>
                <label>
                    Date
                    <input type="date" id="availability-date" />
                </label>
                <button id="check-availability-btn" type="button">Check Availability</button>
            </div>
            <div id="availability-results" class="slots"></div>
        </section>

        <section class="panel" id="booking-form-section">
            <h2>Create Booking</h2>
            <form id="booking-form" class="grid-form">
                <label>
                    Facility
                    <select id="booking-facility" required></select>
                </label>
                <label id="booking-user-label">
                    User
                    <select id="booking-user" required></select>
                </label>
                <label>
                    Booking Date
                    <input type="date" id="booking-date" required />
                </label>
                <label>
                    Start Time
                    <select id="booking-start-time" required></select>
                </label>
                <label>
                    End Time
                    <select id="booking-end-time" required></select>
                </label>
                <button type="submit">Create Booking</button>
            </form>
            <p id="booking-form-message" class="message"></p>
            <p class="message">New bookings are submitted with <strong>PENDING</strong> status.</p>
        </section>

        <section class="panel" id="bookings-section">
            <div class="section-title-row">
                <h2>Booking History</h2>
                <button id="refresh-bookings-btn" type="button">Refresh</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Facility</th>
                        <th>User</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody id="bookings-body"></tbody>
                </table>
            </div>
        </section>

    </div>
</main>

<!-- Bottom Navigation (mobile) -->
<nav class="bottom-nav">
    <button type="button" class="bottom-nav-item active" data-section="facilities-section">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
        <span>Facilities</span>
    </button>
    <button type="button" class="bottom-nav-item" data-section="availability-section">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
        <span>Availability</span>
    </button>
    <button type="button" class="bottom-nav-item" data-section="booking-form-section">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <span>Book</span>
    </button>
    <button type="button" class="bottom-nav-item" data-section="bookings-section">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
        <span>History</span>
    </button>
    <a href="/api/v1/admin.html" class="bottom-nav-item admin-only" style="text-decoration:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.44.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        <span>Admin</span>
    </a>
</nav>

<!-- Cancel Confirmation Modal -->
<div id="cancel-modal" class="modal-overlay" hidden>
    <div class="modal">
        <div class="modal-icon">&#9888;</div>
        <h3 class="modal-title">Cancel Booking</h3>
        <p class="modal-body">Are you sure you want to cancel booking <strong id="cancel-modal-id"></strong>? This action cannot be undone.</p>
        <div class="modal-actions">
            <button type="button" id="cancel-modal-no" class="btn-secondary">Keep Booking</button>
            <button type="button" id="cancel-modal-yes" class="btn-danger">Yes, Cancel</button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script src="/api/v1/api.js"></script>
<script src="/api/v1/app-user.js"></script>
</body>
</html>
