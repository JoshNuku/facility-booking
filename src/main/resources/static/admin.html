<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Campus Facility Booking - Admin</title>
    <link rel="manifest" href="/api/v1/manifest.json" />
    <link rel="icon" href="/api/v1/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/api/v1/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/api/v1/styles.css" />
    <script>
        (function () {
            var s = JSON.parse(localStorage.getItem("session") || "null");
            if (!s) { window.location.replace("/api/v1/login.html"); return; }
            if (s.role !== "ADMIN") { window.location.replace("/api/v1/index.html"); return; }
        })();
    </script>
</head>
<body>

<!-- App Bar -->
<header class="app-bar">
    <div class="app-bar-inner">
        <a class="app-bar-brand" href="/api/v1/index.html">
            <span class="app-bar-logo">🏛️</span>
            <span class="app-bar-title desktop-only">Campus Booking</span>
        </a>
        <div class="user-chip">
            <div class="user-avatar" id="user-avatar"></div>
            <span class="user-name desktop-only" id="user-name"></span>
            <button type="button" class="logout-btn" id="logout-btn" title="Sign Out">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="app-content">
    <div class="container page-shell">

        <!-- Dashboard Stats -->
        <section class="admin-stats" id="admin-stats">
            <div class="stat-card stat-facilities">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-facilities">--</span>
                    <span class="stat-label">Facilities</span>
                </div>
            </div>
            <div class="stat-card stat-users">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-users">--</span>
                    <span class="stat-label">Users</span>
                </div>
            </div>
            <div class="stat-card stat-bookings">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-bookings">--</span>
                    <span class="stat-label">Bookings</span>
                </div>
            </div>
            <div class="stat-card stat-pending">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-pending">--</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>
        </section>

        <!-- Facilities Section -->
        <section class="panel admin-panel" id="admin-facilities-section">
            <div class="admin-panel-header">
                <div class="admin-panel-title">
                    <div class="admin-panel-icon facilities-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
                    </div>
                    <div>
                        <h2>Facilities</h2>
                        <p class="admin-panel-subtitle">Add, edit or remove bookable spaces</p>
                    </div>
                </div>
                <button type="button" class="btn-icon-text" id="toggle-facility-form">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    <span>Add New</span>
                </button>
            </div>

            <div class="admin-form-drawer" id="facility-form-drawer" hidden>
                <form id="facility-admin-form" class="admin-form">
                    <input type="hidden" id="facility-admin-id" />
                    <div class="admin-form-grid">
                        <label>
                            Name
                            <input type="text" id="facility-admin-name" placeholder="e.g. Conference Room A" required />
                        </label>
                        <label>
                            Location
                            <input type="text" id="facility-admin-location" placeholder="e.g. Block B, Floor 2" required />
                        </label>
                        <label>
                            Capacity
                            <input type="number" id="facility-admin-capacity" min="1" placeholder="e.g. 30" required />
                        </label>
                    </div>
                    <div class="admin-form-actions">
                        <button type="submit" id="facility-admin-submit">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                            Save Facility
                        </button>
                        <button type="button" id="facility-admin-clear" class="btn-secondary">Cancel</button>
                    </div>
                    <p id="facility-admin-message" class="message"></p>
                </form>
            </div>

            <div id="facility-admin-cards" class="admin-cards"></div>
        </section>

        <!-- Users Section -->
        <section class="panel admin-panel" id="admin-users-section">
            <div class="admin-panel-header">
                <div class="admin-panel-title">
                    <div class="admin-panel-icon users-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    </div>
                    <div>
                        <h2>Users</h2>
                        <p class="admin-panel-subtitle">Manage registered accounts</p>
                    </div>
                </div>
                <button type="button" class="btn-icon-text" id="toggle-user-form">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Add User</span>
                </button>
            </div>

            <div class="admin-form-drawer" id="user-form-drawer" hidden>
                <form id="user-admin-form" class="admin-form">
                    <input type="hidden" id="user-admin-id" />
                    <div class="admin-form-grid">
                        <label>
                            Name
                            <input type="text" id="user-admin-name" placeholder="Full name" required />
                        </label>
                        <label>
                            Email
                            <input type="email" id="user-admin-email" placeholder="user@campus.edu" required />
                        </label>
                        <label>
                            Role
                            <select id="user-admin-role" required>
                                <option value="STUDENT">Student</option>
                                <option value="STAFF">Staff</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </label>
                    </div>
                    <div class="admin-form-actions">
                        <button type="submit" id="user-admin-submit">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                            Save User
                        </button>
                        <button type="button" id="user-admin-clear" class="btn-secondary">Cancel</button>
                    </div>
                    <p id="user-admin-message" class="message"></p>
                </form>
            </div>

            <div id="user-admin-cards" class="admin-cards"></div>
        </section>

        <!-- Bookings Section -->
        <section class="panel admin-panel" id="admin-bookings-section">
            <div class="admin-panel-header">
                <div class="admin-panel-title">
                    <div class="admin-panel-icon bookings-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    </div>
                    <div>
                        <h2>Bookings</h2>
                        <p class="admin-panel-subtitle">Review and manage all reservations</p>
                    </div>
                </div>
                <button id="refresh-admin-bookings-btn" type="button" class="btn-icon-text btn-secondary">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    <span>Refresh</span>
                </button>
            </div>

            <div id="admin-bookings-cards" class="admin-booking-list"></div>
        </section>

    </div>
</main>

<!-- Bottom Navigation (mobile) -->
<nav class="bottom-nav">
    <button type="button" class="bottom-nav-item active" data-section="admin-facilities-section">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
        <span>Facilities</span>
    </button>
    <button type="button" class="bottom-nav-item" data-section="admin-users-section">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span>Users</span>
    </button>
    <button type="button" class="bottom-nav-item" data-section="admin-bookings-section">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <span>Bookings</span>
    </button>
</nav>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script src="/api/v1/api.js"></script>
<script src="/api/v1/app-admin.js"></script>
</body>
</html>
